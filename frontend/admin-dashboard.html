<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Admin Dashboard</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<!-- PDF LIBRARY -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
background:linear-gradient(135deg,#141e30,#243b55);
min-height:100vh;
font-family:Segoe UI;
}

.card-box{
background:#0f172a;
padding:25px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

</style>

</head>

<body>

<nav class="navbar navbar-dark bg-dark px-4">

<h4 style="color:#ff7200">Admin Dashboard</h4>

<div>

<a href="admin.html" class="btn btn-outline-light me-2">Calendar</a>
<a href="admin-dashboard.html" class="btn btn-outline-light me-2">History</a>
<a href="index.html" class="btn btn-danger">Logout</a>

</div>

</nav>


<div class="container mt-4">

<div class="card-box">

<h4 class="text-white mb-3">Booking History</h4>

<button class="btn btn-warning mb-3" onclick="generateReport()">
Generate Approved Bookings Report
</button>

<table class="table table-dark table-bordered">

<thead>

<tr>
<th>ID</th>
<th>Hall</th>
<th>Date</th>
<th>Time</th>
<th>Event</th>
<th>Department</th>
<th>Status</th>
<th>Delete</th>
</tr>

</thead>

<tbody id="historyTable"></tbody>

</table>

</div>

</div>


<script>

const API="http://localhost:5000";

let bookingData=[];

loadHistory();

function loadHistory(){

fetch(API+"/requests")

.then(res=>res.json())

.then(data=>{

bookingData=data;

let html="";

data.forEach(r=>{

html+=`

<tr>

<td>${r.booking_id}</td>

<td>
${r.hall_name || (r.hall_id==1?"Seminar Hall 405":"IMERT Seminar Hall")}
</td>

<td>${r.booking_date}</td>

<td>${r.start_time} - ${r.end_time}</td>

<td>${r.event_name}</td>

<td>${r.dept}</td>

<td>

<span class="badge
${r.status==="Approved"?"bg-success":
r.status==="Pending"?"bg-warning":"bg-danger"}">

${r.status}

</span>

</td>

<td>

<button class="btn btn-danger btn-sm"
onclick="deleteBooking(${r.booking_id})">
Delete
</button>

</td>

</tr>

`;

});

document.getElementById("historyTable").innerHTML=html;

});

}


function deleteBooking(id){

if(!confirm("Delete this booking permanently?")) return;

fetch(API+"/deleteBooking",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({id:id})

})

.then(res=>res.text())
.then(data=>{

alert(data);
loadHistory();

});

}



/* GENERATE PDF REPORT */

function generateReport(){

const { jsPDF } = window.jspdf;

let doc = new jsPDF();

doc.setFontSize(16);
doc.text("Seminar Hall Approved Booking Report",20,20);

let y=40;

bookingData
.filter(b => b.status === "Approved")
.forEach((b,index)=>{

let hallName = b.hall_name || (b.hall_id==1?"Seminar Hall 405":"IMERT Seminar Hall");

doc.setFontSize(11);


doc.text(`Hall: ${hallName}`,20,y+7);
doc.text(`Date: ${b.booking_date}`,20,y+14);
doc.text(`Time: ${b.start_time} - ${b.end_time}`,20,y+21);
doc.text(`Event: ${b.event_name}`,20,y+28);
doc.text(`Department: ${b.dept}`,20,y+35);

y += 50;

if(y>260){
doc.addPage();
y=20;
}

});

doc.save("Approved_Booking_Report.pdf");

}

</script>

</body>
</html>
