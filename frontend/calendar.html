<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Seminar Hall Calendar</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css"
rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<style>

body{
background:linear-gradient(135deg,#141e30,#243b55);
min-height:100vh;
font-family:Segoe UI, sans-serif;
}

.navbar{
box-shadow:0 4px 15px rgba(0,0,0,0.4);
}

.dashboard-card{
background:#0f172a;
border-radius:14px;
padding:25px;
box-shadow:0 15px 35px rgba(0,0,0,0.6);
margin-bottom:25px;
margin-top:25px;
}

.dashboard-title{
color:white;
font-weight:600;
}

.fc-button{
background:#ff7a18 !important;
border:none !important;
}

.fc-button:hover{
background:#ffa03a !important;
}

.fc-toolbar-title{
color:white !important;
font-weight:600;
}

.fc-col-header-cell{
background:#111827;
}

.fc-daygrid-day{
background:#1f2937;
}

/* EVENT STYLE */

.fc-event{
background:#C41E3A !important;
border:none !important;
border-radius:6px;
font-size:12px;
padding:4px;
color:white !important;
}

.fc-event:hover{
background:#942222 !important;
}

/* HOLIDAY GREY CELLS */

.fc-bg-event{
background:#9ca3af !important;
opacity:0.35;
}

/* LAYOUT */

.main-layout{
display:flex;
gap:40px;
align-items:flex-start;
}

.sidebar{
width:260px;
background:#0f172a;
border-radius:12px;
padding:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.6);
max-height:520px;
overflow:auto;
}

.sidebar h5{
color:#ff7a18;
margin-bottom:15px;
}

#calendar{
flex:1;
min-width:700px;
height:520px;
}

.booking-card{
background:#1f2937;
padding:10px;
border-radius:8px;
margin-bottom:10px;
font-size:13px;
transition:all .25s ease;
border-left:3px solid #ff7200;
color:white;
}

.booking-card.active{
transform:scale(1.05);
background:#2d3748;
box-shadow:0 0 10px rgba(255,122,24,0.6);
}

.fc-col-header-cell-cushion{
color:white !important;
}

.fc-daygrid-day-number{
color:white !important;
}

</style>

</head>

<body>

<nav class="navbar navbar-dark bg-dark px-4">

<h4 style="color:#ff7a18">Seminar Hall</h4>

<div>
<a href="calendar.html" class="btn btn-outline-light me-2">Calendar</a>
<a href="booking.html" class="btn btn-outline-light me-2">Book Slot</a>
<a href="dashboard.html" class="btn btn-outline-light me-2">Dashboard</a>
<a href="index.html" class="btn btn-danger">Logout</a>
</div>

</nav>


<div class="container mt-4">

<div class="dashboard-card">

<h4 class="dashboard-title mb-3">
Seminar Hall Booking Calendar
</h4>

<div class="main-layout">

<div class="sidebar">
<h5>Booked Slots</h5>
<div id="sidebarBookings"></div>
</div>

<div id="calendar"></div>

</div>

</div>

</div>


<script>

const API="http://localhost:5000";

/* HOLIDAY DATES */

const holidays=[
"2026-03-03",
"2026-04-03",
"2026-04-14",
"2026-02-19",
"2026-03-19",
"2026-03-21",
"2026-05-01",
"2026-05-23"
];

let calendar;
let tooltip;

document.addEventListener("DOMContentLoaded",function(){

const calendarEl=document.getElementById("calendar");

calendar=new FullCalendar.Calendar(calendarEl,{

initialView:"dayGridMonth",

contentHeight:520,

headerToolbar:{
left:"prev,next today",
center:"title",
right:"dayGridMonth"
},

events:loadEvents

});

calendar.render();

});


function loadEvents(fetchInfo,successCallback){

fetch(API+"/bookings")

.then(res=>res.json())

.then(data=>{

let events=[];
let sidebarHTML="";

/* BOOKING EVENTS */

data.forEach((b,index)=>{

let date=b.booking_date.split("T")[0];
let id="event"+index;

events.push({

id:id,

title:
(b.event_name || "Seminar")+
" ("+
b.start_time.substring(0,5)+
" - "+
b.end_time.substring(0,5)+
")",

start:date+"T"+b.start_time,
end:date+"T"+b.end_time

});

sidebarHTML+=`

<div class="booking-card" id="side-${id}">
<b>${b.event_name || "Seminar"}</b><br>
${date}<br>
${b.start_time.substring(0,5)} - ${b.end_time.substring(0,5)}
</div>

`;

});

/* HOLIDAY GREY BACKGROUND */

holidays.forEach(d=>{

events.push({
start:d,
display:"background"
});

});

document.getElementById("sidebarBookings").innerHTML=sidebarHTML;

successCallback(events);

});

}

</script>

</body>
</html>
