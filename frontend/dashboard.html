<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>User Dashboard</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<style>

body{
background:linear-gradient(135deg,#141e30,#243b55);
min-height:100vh;
font-family:Segoe UI;
}

.card-box{
background:#0f172a;
padding:25px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

</style>

</head>

<body>

<nav class="navbar navbar-dark bg-dark px-4">

<h4 style="color:#ff7200">User Dashboard</h4>

<div>

<a href="calendar.html" class="btn btn-outline-light me-2">Calendar</a>
<a href="dashboard.html" class="btn btn-outline-light me-2">Dashboard</a>
<a href="index.html" class="btn btn-danger">Logout</a>

</div>

</nav>

<div class="container mt-4">

<div class="card-box">

<h4 class="text-white mb-3">My Booking Requests</h4>

<table class="table table-dark table-bordered">

<thead>

<tr>
<th>Hall</th>
<th>Date</th>
<th>Time</th>
<th>Event</th>
<th>Status</th>
<th>Cancel</th>
</tr>

</thead>

<tbody id="userBookings"></tbody>

</table>

</div>

</div>


<script>

const API="http://localhost:5000";

const user=JSON.parse(localStorage.getItem("user"));

fetch(API+"/userBookings/"+user.user_id)

.then(res=>res.json())

.then(data=>{

let html="";

data.forEach(b=>{

html+=`

<tr>

<td>${b.hall_name || (b.hall_id==1?"Seminar Hall 405":"IMERT Seminar Hall")}</td>
<td>${b.booking_date}</td>
<td>${b.start_time} - ${b.end_time}</td>
<td>${b.event_name}</td>

<td>

<span class="badge
${b.status==="Approved"?"bg-success":
b.status==="Pending"?"bg-warning":"bg-danger"}">

${b.status}

</span>

</td>

<td>

<button class="btn btn-danger btn-sm"
onclick="cancelBooking(${b.booking_id})">

Cancel

</button>

</td>

</tr>

`;

});

document.getElementById("userBookings").innerHTML=html;

});


function cancelBooking(id){

if(!confirm("Cancel this booking request?")) return;

fetch(API+"/cancel",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({id:id})

})

.then(res=>res.text())

.then(data=>{

alert(data);

location.reload();

});

}

</script>

</body>
</html>
