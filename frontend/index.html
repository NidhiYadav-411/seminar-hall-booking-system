<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Seminar Hall Scheduler</title>

<!-- Bootstrap CDN -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- HEADER -->
<header class="bg-dark text-white text-center py-3">
<h2>Seminar Hall Scheduler</h2>
<p class="mb-0">Schedule and manage seminar hall bookings efficiently</p>
</header>


<!-- MAIN CONTAINER -->
<div class="container mt-5 mb-5">

<div class="row justify-content-center">

<div class="col-lg-7">

<div class="card shadow-sm p-4">

<h4 class="mb-4 text-center">Book a Seminar Hall</h4>

<form id="hallBookingForm">

<!-- NAME -->
<div class="mb-3">
<label class="form-label">Full Name</label>
<input 
type="text"
class="form-control"
id="userName"
placeholder="Enter your full name"
required>
</div>


<!-- EMAIL -->
<div class="mb-3">
<label class="form-label">Email Address</label>
<input 
type="email"
class="form-control"
id="userEmail"
placeholder="Enter your email"
required>
</div>


<!-- PHONE -->
<div class="mb-3">
<label class="form-label">Phone Number</label>
<input 
type="tel"
class="form-control"
id="userPhone"
placeholder="Enter phone number"
required>
</div>


<!-- HALL SELECTION -->
<div class="mb-3">
<label class="form-label">Select Seminar Hall</label>

<select class="form-select" id="hallSelect" required>

<option value="">Choose Hall</option>

<option value="1">Seminar Hall 405</option>

<option value="2">IMERT Seminar Hall</option>

</select>
</div>


<!-- DATE -->
<div class="mb-3">
<label class="form-label">Event Date</label>

<input 
type="date"
class="form-control"
id="eventDate"
required>

</div>


<!-- TIME SLOT -->
<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">Start Time</label>

<input 
type="time"
class="form-control"
id="startTime"
required>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">End Time</label>

<input 
type="time"
class="form-control"
id="endTime"
required>

</div>

</div>


<!-- SUBMIT BUTTON -->
<div class="text-center mt-3">

<button 
type="submit"
class="btn btn-primary px-5">

Submit Booking Request

</button>

</div>

</form>

</div>

</div>

</div>

</div>


<!-- FOOTER -->
<footer class="bg-light text-center py-3">

<p class="mb-0">
Seminar Hall Scheduler • College Event Booking System
</p>

</footer>


<!-- JAVASCRIPT -->
<script src="script.js"></script>

</body>
</html>
