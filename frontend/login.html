<!DOCTYPE html>
<html>
<head>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

</head>

<body>

<div class="container mt-5">

<div class="card-dark col-md-4 mx-auto">

<h3 class="text-center">Login</h3>

<select id="role" class="form-control mb-3">
<option value="user">Login as User</option>
<option value="admin">Login as Admin</option>
</select>

<input id="email" class="form-control mb-2" placeholder="Email">

<input id="password" type="password" class="form-control mb-3" placeholder="Password">

<button class="btn btn-light w-100" onclick="login()">Login</button>

<br>

<p class="text-center">
New user? <a href="#" onclick="showSignup()">Signup</a>
</p>



<div id="signupSection" style="display:none;">

<hr style="border-color:#444">

<h3 class="text-center">Signup</h3>



<select id="roleSignup" class="form-control mb-3">
<option value="user">Signup as User</option>
</select>

<input id="name" class="form-control mb-2" placeholder="Name">

<input id="emailSignup" class="form-control mb-2" placeholder="Email">

<input id="phone" class="form-control mb-2" placeholder="Phone">

<input id="passwordSignup" type="password" class="form-control mb-3" placeholder="Password">

<button class="btn-orange w-100" onclick="signup()">Signup</button>

</div>

</div>

</div>


<script>



function showSignup(){
document.getElementById("signupSection").style.display="block";
}




function signup(){

fetch("http://localhost:5000/signup",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

name:document.getElementById("name").value,
email:document.getElementById("emailSignup").value,
phone:document.getElementById("phone").value,
password:document.getElementById("passwordSignup").value,
role:document.getElementById("roleSignup").value

})

})

.then(res=>res.text())

.then(data=>{

alert(data);


document.getElementById("signupSection").style.display="none";



document.getElementById("name").value="";
document.getElementById("emailSignup").value="";
document.getElementById("phone").value="";
document.getElementById("passwordSignup").value="";

})

.catch(err=>{
console.error(err);
alert("Signup failed");
})

}




function login(){

fetch("http://localhost:5000/login",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

email:document.getElementById("email").value,
password:document.getElementById("password").value,
role:document.getElementById("role").value

})

})

.then(res=>res.json())

.then(data=>{

if(data.success){

localStorage.setItem("user",JSON.stringify(data.data));
localStorage.setItem("role",document.getElementById("role").value);

if(document.getElementById("role").value==="user"){
location="calendar.html";
}
else{
location="admin.html";
}

}
else{
alert("Invalid login");
}

})

.catch(err=>{
console.error(err);
alert("Login error");
})

}

</script>

</body>
</html>
